services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - ${DB_TEST_PORT}:3306
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - miniblog_net
      
  app:
    image: php:8.2-apache
    restart: unless-stopped
    command: 
       bash -c "
        apt-get update &&
        apt-get install -y msmtp &&
        docker-php-ext-install pdo_mysql &&
        echo 'host mailhog' > /etc/msmtprc &&
        echo 'port 1025' >> /etc/msmtprc &&
        echo 'from webmaster@miniblog.local' >> /etc/msmtprc &&
        echo 'sendmail_path=/usr/bin/msmtp -t' > /usr/local/etc/php/conf.d/mail.ini &&
        apache2-foreground"

    ports:
      - ${APP_TEST_PORT}:80
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: miniblog
      DB_USER: bloguser
      DB_PASSWORD: blogpass
      SMTP_HOST: mailhog
      SMTP_PORT: ${MAILHOG_1_PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - miniblog_net
  phpmyadmin:
    image: phpmyadmin:latest

    ports:
      - ${PHP_TEST_PORT}:80
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - miniblog_net
  mailhog:
    image: mailhog/mailhog:latest
    
    ports:
      - ${MAILHOG_1_TEST_PORT}:${MAILHOG_1_TEST_PORT}
      - ${MAILHOG_2_TEST_PORT}:${MAILHOG_2_TEST_PORT}
    networks:
      - miniblog_net

volumes:
  db_data:
networks:
  miniblog_net:
    driver: bridge